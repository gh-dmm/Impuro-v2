<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IMPURO</title>

  <!-- CSS -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- ===== PANTALLA 1 ===== -->
  <div id="pantalla1" class="pantalla">
    <div id="particles"></div>

    <div class="contenido">
      <h1>IMPURO</h1>
      <div class="neon">Powered by fcc</div>
      <button onclick="cambiar()">Comienza</button>
    </div>
  </div>

  <!-- ===== PANTALLA 2 ===== -->
  <div id="pantalla2" class="pantalla">
<div id="ui-top">
  <span id="score">Puntaje: 0</span>
  <span id="nivel">Nivel: 1</span>
</div>
    <!-- FONDO -->
    <!---<div id="fondo-escena"></div>--->

    <!---Cambiar el class figura por el src--->
    <img id="personaje" src=""></div>
    <!---<div id="personaje" class="figura"></div>--->

    <div class="piso"></div>

    <div class="controles">
      <button 
        onmousedown="moviendo = -1" 
        onmouseup="moviendo = 0"
        ontouchstart="moviendo = -1" 
        ontouchend="moviendo = 0"
        onclick="mover(-1)">◀</button>

      <button onclick="accion()">●</button>

      <button 
        onmousedown="moviendo = 1" 
        onmouseup="moviendo = 0"
        ontouchstart="moviendo = 1" 
        ontouchend="moviendo = 0"
        onclick="mover(1)">▶</button>
    </div>

    <div id="dialogo" class="dialogo">
      <p>Interacción activada</p>
      <button onclick="cerrar()">Cerrar</button>
    </div>

  </div>

  <!-- ===== SCRIPTS (IMPORTANTE: AL FINAL) ===== -->
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
  <script src="app.js"></script>

</body>
</html>
